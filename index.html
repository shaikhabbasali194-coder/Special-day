<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Bestie 🎉</title>

<style>
body {
    margin: 0;
    padding: 0;
    text-align: center;
    font-family: Arial, sans-serif;
    color: white;
    overflow: hidden;
}

/* 🎬 Video */
video {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: none;
    z-index: -2;
}

video.active {
    display: block;
}

/* Overlay */
.overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: -1;
}

.container {
    margin-top: 40px;
}

/* Slideshow */
.slideshow {
    width: 280px;
    height: 350px;
    margin: 20px auto;
    border-radius: 20px;
    overflow: hidden;
    position: relative;
}

.slideshow img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    position: absolute;
    opacity: 0;
    transition: 1s;
}

.slideshow img.active {
    opacity: 1;
}

button {
    padding: 12px 25px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}
</style>
</head>

<body>

<!-- 🎬 3 VIDEOS -->
<video class="active" id="v1" autoplay muted loop>
    <source src="video1.mp4" type="video/mp4">
</video>

<video id="v2" muted loop>
    <source src="video2.mp4" type="video/mp4">
</video>

<video id="v3" muted loop>
    <source src="video3.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="container">
    <h1>🎂 Happy Birthday Bestie 🎉</h1>
    <p>Tu sirf dost nahi, family hai 💙</p>

    <!-- 📸 Photos -->
    <div class="slideshow">
        <img src="pic1.jpg" class="active">
        <img src="pic2.jpg">
        <img src="pic3.jpg">
        <img src="pic4.jpg">
    </div>

    <button onclick="startParty()">🎁 Start Party</button>
    <p id="msg"></p>
</div>

<script>
// 🎬 Video switch (3 videos)
let videos = [
    document.getElementById("v1"),
    document.getElementById("v2"),
    document.getElementById("v3")
];

let current = 0;

setInterval(()=>{
    videos[current].classList.remove("active");
    current = (current + 1) % videos.length;
    videos[current].classList.add("active");
}, 8000);

// 📸 Photo slideshow
let slides = document.querySelectorAll(".slideshow img");
let i = 0;

setInterval(()=>{
    slides[i].classList.remove("active");
    i = (i+1) % slides.length;
    slides[i].classList.add("active");
}, 2000);

// 🎁 Button
function startParty(){
    videos.forEach(v => v.muted = false);
    document.getElementById("msg").innerHTML =
    "🔥 Happy Birthday Bhai! Ab asli party shuru 🎉😎";
}
</script>

</body>
</html>
